name: Update profile activity

on:
  schedule:
    - cron: "17 8 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-activity:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate activity SVG
        env:
          PROFILE_USERNAME: Micoh18
          GH_TOKEN: ${{ github.token }}
        run: python3 scripts/update_activity.py

      - name: Commit changes when needed
        run: |
          if git diff --quiet -- assets/activity.svg; then
            echo "No activity changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/activity.svg
          git commit -m "📊 Updates profile activity"
          git push
